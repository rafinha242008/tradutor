<main>
    <h1>Login</h1>
    <!-- <input> cria campo placeholder nome dentro formulário-->
    <input id="input" placeholder="senha">
    <button onclick="login()">Enviar</button>
    <p id="msg">Saída</p>
     
  </main>

  <script>
    // value passa o valor do input
                         // quando for input utiliza value
      function login() {  
       
     
    let senhaDigitada = document.querySelector("#input").value;
    let senha ="123";
           if(senhaDigitada==senha) {
        document.querySelector("#msg").textContent="Logando...";
    }else{
        document.querySelector("#msg").textContent="Senha incorreta..."
    }
 
   
    }
  </script>
